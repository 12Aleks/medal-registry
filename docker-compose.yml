services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: medal_db
    ports:
      - "5432:5432"
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: medal_db
    depends_on:
      - db
    ports:
      - "5000:5000"

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://api:5000
    depends_on:
      - api